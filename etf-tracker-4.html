<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🇺🇸 ETF 포트폴리오</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;font-family:'Noto Sans KR',sans-serif;color:#1e293b;font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.hd{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:99;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.hd-in{max-width:780px;margin:0 auto;padding:0 14px}
.hd-top{display:flex;justify-content:space-between;align-items:center;padding:12px 0 8px}
.logo{font-size:16px;font-weight:800;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:#94a3b8;margin-top:1px}
.total-box{text-align:right}
.total-lbl{font-size:9px;color:#94a3b8;font-weight:600;letter-spacing:.05em}
.total-amt{font-size:20px;font-weight:800;color:#6366f1;line-height:1.1}
.total-sub{font-size:10px;color:#94a3b8}
.idx-bar{display:flex;height:4px;border-radius:99px;overflow:hidden;gap:2px;margin-bottom:6px}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#94a3b8;font-family:inherit;font-size:12px;font-weight:500;padding:9px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab.on{color:#6366f1;border-bottom-color:#6366f1;font-weight:700}
.content{max-width:780px;margin:0 auto;padding:14px 12px 60px}
.page{display:none}.page.on{display:block}

/* broker card */
.broker-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.broker-card.irp{border-color:#fde68a;background:#fffdf5}
.broker-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.broker-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.broker-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.broker-name-inp{border:none;outline:none;font-size:14px;font-weight:700;color:#1e293b;background:transparent;font-family:inherit;width:100%;min-width:0}
.irp-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;background:#fef3c7;color:#d97706;border:1px solid #fde68a;white-space:nowrap;flex-shrink:0}
.broker-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px}
.broker-amt{font-size:15px;font-weight:700;text-align:right}
.broker-pct{font-size:10px;color:#94a3b8;text-align:right}
.bar-bg{background:#f1f5f9;border-radius:99px;overflow:hidden;height:6px;margin:8px 0 12px}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.etf-section{margin-bottom:4px}
.etf-col-hdr{display:grid;grid-template-columns:1.8fr 62px 62px 62px;gap:5px;padding:0 4px;margin-bottom:4px}
.etf-col-hdr span{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8}
.etf-col-hdr span:nth-child(2),.etf-col-hdr span:nth-child(3),.etf-col-hdr span:nth-child(4){text-align:center}
.etf-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 10px 8px;margin-bottom:6px}
.etf-item-top{display:grid;grid-template-columns:1.8fr 62px 62px 62px;gap:5px;align-items:center;margin-bottom:6px}
.etf-name-wrap{display:flex;align-items:center;gap:5px}
.etf-emoji{font-size:12px;flex-shrink:0}
.etf-name-inp{border:1.5px solid #e2e8f0;border-radius:7px;padding:6px 8px;font-family:inherit;font-size:12px;color:#1e293b;background:#fff;width:100%;outline:none;min-width:0}
.etf-name-inp:focus{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.1)}
.etf-name-inp::placeholder{color:#cbd5e1}
.etf-num-inp{border:1.5px solid #e2e8f0;border-radius:7px;padding:6px 4px;font-family:inherit;font-size:12px;color:#1e293b;background:#fff;width:100%;outline:none;text-align:center}
.etf-num-inp:focus{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.1)}
.etf-num-inp::placeholder{color:#cbd5e1}
.etf-num-inp.buy{background:#fffbeb;border-color:#fde68a}
.etf-num-inp.buy:focus{border-color:#f59e0b}
.etf-item-bot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.etf-val{font-size:13px;font-weight:700;color:#16a34a}
.etf-val.empty{color:#cbd5e1;font-weight:400}
.etf-pct{font-size:10px;color:#94a3b8}
.etf-profit{font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap}
.etf-profit.pos{background:#f0fdf4;color:#16a34a}
.etf-profit.neg{background:#fef2f2;color:#ef4444}
.etf-profit.zero{background:#f8fafc;color:#94a3b8}
.etf-del{background:none;border:none;color:#cbd5e1;font-size:13px;cursor:pointer;padding:2px 4px;line-height:1}
.etf-del:hover{color:#ef4444}
.add-area{margin-top:10px;padding-top:10px;border-top:1px solid #f0f4f8}
.quick-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin-bottom:5px}
.quick-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.tag{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:500;cursor:pointer;background:#f1f5f9;border:1px solid #e2e8f0;color:#475569}
.tag:hover{background:#ede9fe;border-color:#c4b5fd;color:#7c3aed}
.btn-add{background:#fff;border:1.5px solid #e2e8f0;color:#64748b;border-radius:8px;padding:5px 12px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer}
.btn-add:hover{border-color:#6366f1;color:#6366f1}
.btn-primary{background:#6366f1;border:none;border-radius:8px;padding:7px 14px;color:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#4f46e5}
.btn-danger{background:#fee2e2;border:none;border-radius:8px;padding:7px 10px;color:#dc2626;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.btn-del-broker{background:none;border:none;color:#cbd5e1;font-size:16px;cursor:pointer;padding:0;line-height:1}
.btn-del-broker:hover{color:#ef4444}
.add-broker-panel{display:none;gap:6px;padding:12px;margin-bottom:12px;background:#faf5ff;border:1.5px solid #c4b5fd;border-radius:12px;flex-wrap:wrap}
.add-broker-sel,.add-broker-inp{flex:1;min-width:110px;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 9px;font-family:inherit;font-size:12px;outline:none;color:#1e293b}
.add-broker-inp::placeholder{color:#cbd5e1}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hint-txt{font-size:11px;color:#94a3b8}
.card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cat-card{border-radius:14px;padding:16px;margin-bottom:10px;border:2px solid}
.cat-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
/* 수익률 요약 */
.profit-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.ps-card{border-radius:11px;padding:11px 12px;text-align:center}
.ps-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#94a3b8;margin-bottom:3px}
.ps-val{font-size:16px;font-weight:800;line-height:1.1}
.ps-sub{font-size:9px;margin-top:2px;color:#94a3b8}
/* Sheets 연동 버튼 */
.sheets-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;margin-bottom:10px;flex-wrap:wrap;background:#f0fdf4;border:1.5px solid #bbf7d0}
.sheets-bar.err{background:#fef2f2;border-color:#fecaca}
.sheets-bar.loading{background:#eff6ff;border-color:#bfdbfe}
.sheets-btn{background:#16a34a;border:none;border-radius:8px;padding:6px 12px;color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.sheets-btn:hover{background:#15803d}
.sheets-btn.blue{background:#6366f1}.sheets-btn.blue:hover{background:#4f46e5}
.cat-etf-row{background:rgba(255,255,255,.8);border-radius:9px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-c{background:#fff;border:1.5px solid #e2e8f0;border-radius:11px;padding:12px}
.chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}
.broker-sub-row{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:2px;align-items:center}

/* ── 추천 탭 전용 ── */
.rec-hero{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);border-radius:16px;padding:20px;margin-bottom:14px;color:#fff}
.rec-hero-title{font-size:16px;font-weight:800;margin-bottom:4px}
.rec-hero-sub{font-size:11px;opacity:.8}
.age-selector{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.age-btn{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:99px;padding:5px 14px;color:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.age-btn.on{background:#fff;color:#6366f1}
.rec-profile{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:12px}
.rec-profile-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.profile-icon{font-size:32px;line-height:1}
.profile-name{font-size:15px;font-weight:800;color:#1e293b}
.profile-sub{font-size:11px;color:#64748b;margin-top:2px}
.rec-alloc{display:flex;height:14px;border-radius:99px;overflow:hidden;gap:2px;margin-bottom:12px}
.rec-alloc-seg{display:flex;align-items:center;justify-content:center;min-width:24px;transition:flex .5s ease}
.rec-alloc-lbl{font-size:9px;color:#fff;font-weight:700}
.rec-items{display:flex;flex-direction:column;gap:8px}
.rec-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px}
.rec-item-bar-bg{flex:1;background:#f1f5f9;border-radius:99px;height:8px;overflow:hidden}
.rec-item-bar{height:100%;border-radius:99px;transition:width .5s ease}
.rec-item-pct{font-size:14px;font-weight:800;min-width:42px;text-align:right}
.rec-item-name{font-size:12px;font-weight:600;min-width:72px}
.rec-gap{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:14px;margin-top:12px}
.rec-gap-title{font-size:12px;font-weight:700;color:#d97706;margin-bottom:8px}
.rec-gap-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:5px}
.gap-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.gap-over{background:#fee2e2;color:#dc2626}
.gap-under{background:#dcfce7;color:#16a34a}
.gap-ok{background:#f1f5f9;color:#64748b}
.data-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.data-table th{background:#f8fafc;padding:6px 8px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#94a3b8;text-align:center;border-bottom:1px solid #e2e8f0}
.data-table td{padding:5px 8px;text-align:center;border-bottom:1px solid #f1f5f9;font-size:11px}
.data-table td:first-child{font-weight:600;color:#475569;text-align:left}
.pos{color:#16a34a;font-weight:600}
.neg{color:#ef4444;font-weight:600}
.risk-bar{display:flex;align-items:center;gap:6px;margin-top:4px}
.risk-seg{height:6px;border-radius:2px;flex:1}
.notice{font-size:10px;color:#94a3b8;margin-top:10px;line-height:1.6;padding:10px;background:#f8fafc;border-radius:8px}

/* ── 시뮬레이션 탭 ── */
.sim-hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);border-radius:16px;padding:20px;margin-bottom:14px;color:#fff}
.sim-hero-title{font-size:16px;font-weight:800;margin-bottom:4px}
.sim-hero-sub{font-size:11px;opacity:.7;margin-bottom:14px}
.sim-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sim-input-group{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 12px}
.sim-input-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.6);margin-bottom:5px}
.sim-input-val{font-size:16px;font-weight:800;color:#fff;margin-bottom:4px}
.sim-inp{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:5px 8px;color:#fff;font-family:inherit;font-size:13px;width:100%;outline:none}
.sim-inp::placeholder{color:rgba(255,255,255,.4)}
.sim-run-btn{width:100%;margin-top:12px;background:#6366f1;border:none;border-radius:10px;padding:11px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.03em}
.sim-run-btn:hover{background:#4f46e5}
.sim-scenario-tabs{display:flex;gap:6px;margin-bottom:12px}
.sim-stab{flex:1;background:#fff;border:2px solid #e2e8f0;border-radius:99px;padding:6px 0;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.sim-stab.on{color:#fff;border-color:transparent}
.chart-wrap{position:relative;width:100%;height:220px;margin:10px 0}
canvas{border-radius:8px}
.sim-result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.sim-r-card{border-radius:11px;padding:12px 14px}
.sim-r-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;opacity:.7}
.sim-r-val{font-size:18px;font-weight:800;line-height:1.1}
.sim-r-sub{font-size:10px;margin-top:2px;opacity:.7}
.milestones{display:flex;flex-direction:column;gap:0}
.ms-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.ms-row:last-child{border-bottom:none}
.ms-year{font-size:11px;font-weight:700;color:#94a3b8;min-width:44px}
.ms-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ms-info{flex:1}
.ms-amt{font-size:14px;font-weight:800}
.ms-sub{font-size:10px;color:#94a3b8;margin-top:1px}
.ms-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap}
.scenario-compare{width:100%;border-collapse:collapse;font-size:11px}
.scenario-compare th{background:#f8fafc;padding:7px 8px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#94a3b8;border-bottom:1px solid #e2e8f0;text-align:center}
.scenario-compare td{padding:7px 8px;text-align:center;border-bottom:1px solid #f8fafc;font-size:12px}
.scenario-compare td:first-child{text-align:left;font-weight:600;color:#475569}

/* ── 가격 연동 배너 ── */
.price-banner{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;border-radius:10px;margin-bottom:12px;flex-wrap:wrap}
.price-banner.idle{background:#f1f5f9;border:1.5px solid #e2e8f0}
.price-banner.loading{background:#eff6ff;border:1.5px solid #bfdbfe}
.price-banner.success{background:#f0fdf4;border:1.5px solid #bbf7d0}
.price-banner.error{background:#fef2f2;border:1.5px solid #fecaca}
.price-banner-txt{font-size:12px;font-weight:600;flex:1}
.price-banner-sub{font-size:10px;color:#94a3b8;margin-top:1px}
.price-fetch-btn{background:#6366f1;border:none;border-radius:8px;padding:7px 14px;color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.price-fetch-btn:hover{background:#4f46e5}
.price-fetch-btn:disabled{background:#cbd5e1;cursor:not-allowed}
.api-setup-area{background:#faf5ff;border:1.5px solid #c4b5fd;border-radius:12px;padding:14px;margin-bottom:12px}
.api-setup-title{font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:8px}
.api-url-inp{width:100%;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#1e293b;outline:none;margin-bottom:6px}
.api-url-inp:focus{border-color:#7c3aed}
.api-url-inp::placeholder{color:#cbd5e1}
.price-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-in">
    <div class="hd-top">
      <div><div class="logo">🇺🇸 ETF 포트폴리오</div><div class="logo-sub">미국지수 추종 국내 ETF</div></div>
      <div class="total-box">
        <div class="total-lbl">총 평가금액</div>
        <div class="total-amt" id="gtAmt">-</div>
        <div class="total-sub" id="gtSub"></div>
      </div>
    </div>
    <div class="idx-bar" id="idxBar"></div>
    <div class="tabs">
      <button class="tab on" onclick="sw('portfolio')">📋 증권사별 입력</button>
      <button class="tab" onclick="sw('index')">📈 지수별 비중</button>
      <button class="tab" onclick="sw('rec')">💡 비중 추천</button>
      <button class="tab" onclick="sw('sim')">🔮 투자 시뮬레이션</button>
      <button class="tab" onclick="sw('summary')">📊 전체 현황</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="page on" id="p-portfolio"></div>
  <div class="page" id="p-index"></div>
  <div class="page" id="p-rec"></div>
  <div class="page" id="p-sim"></div>
  <div class="page" id="p-summary"></div>
</div>

<script>
// ── 카테고리 ──────────────────────────────────────────
const CATS=[
  {id:'nasdaq', lb:'나스닥 100',em:'🔵',c:'#3b82f6',bg:'#eff6ff',bd:'#bfdbfe',kw:['나스닥','nasdaq']},
  {id:'sp500',  lb:'S&P 500',   em:'🟢',c:'#16a34a',bg:'#f0fdf4',bd:'#bbf7d0',kw:['s&p500','s&p 500','sp500','에센피']},
  {id:'dow',    lb:'다우존스',   em:'🟠',c:'#ea580c',bg:'#fff7ed',bd:'#fed7aa',kw:['다우존스','배당다우','dow']},
  {id:'other',  lb:'기타',       em:'⚪',c:'#64748b',bg:'#f8fafc',bd:'#e2e8f0',kw:[]},
];
const BCOLORS=['#6366f1','#0ea5e9','#f59e0b','#10b981','#ec4899','#8b5cf6','#14b8a6','#f97316'];
const PRESETS=['KODEX 미국나스닥100','KODEX 미국S&P500','KODEX 미국배당다우존스','TIGER 미국S&P500','TIGER 미국배당다우존스','TIGER 미국나스닥100','SOL 미국배당다우존스','SOL 미국S&P500미국채혼합50'];
const BPRESETS=['삼성증권','한국투자증권','KB증권','NH투자증권','NH투자증권 (IRP·DC)','키움증권','미래에셋증권','신한투자증권','대신증권','카카오페이증권','기타'];

// ── 연도별 실제 수익률 데이터 (1995~2024) ────────────────
// 출처: QQQ(나스닥100), SPY(S&P500), DJIA(다우존스)
// NASDAQ 100: tradethatswing.com / Yahoo Finance QQQ
// S&P 500: slickcharts, Yahoo Finance SPY

// localStorage에서 불러오기
function loadBrokers() {
  try {
    const saved = localStorage.getItem('etf_brokers');
    if (saved) {
      const parsed = JSON.parse(saved);
      return parsed.map(b => {
        const defB = DEFAULT_BROKERS.find(d => d.name === b.name);
        return {
          ...b, id: nid(),
          etfs: b.etfs.map(e => {
            const defE = defB && defB.etfs.find(d => d.name === e.name);
            return {...e, id: nid(), bp: (e.bp && e.bp !== '') ? e.bp : (defE ? defE.bp : '')};
          })
        };
      });
    }
  } catch(e) {}
  return DEFAULT_BROKERS.map(b => ({
    ...b, id: nid(),
    etfs: b.etfs.map(e => ({...e, id: nid(), bp: e.bp||''}))
  }));
}

function saveBrokers() {
  try {
    const toSave = brokers.map(b => ({
      name: b.name, irp: b.irp,
      etfs: b.etfs.map(e => ({name:e.name, sh:e.sh, pr:e.pr, bp:e.bp||''}))
    }));
    localStorage.setItem('etf_brokers', JSON.stringify(toSave));
  } catch(e) {}
}

let priceApi = {
  url: localStorage.getItem('etf_api_url') || '',

  message: 'URL 입력 후 버튼 클릭',

async function fetchPricesFromAPI() {
  if (!priceApi.url.trim()) {
    priceApi.status = 'error'; priceApi.message = 'Apps Script URL을 입력해주세요';
    renderPortfolio(); return;
  }
  priceApi.status = 'loading'; priceApi.message = '현재가 조회 중...'; renderPortfolio();

  const names = [...new Set(brokers.flatMap(b => b.etfs.map(e => e.name.trim())).filter(Boolean))];
  const cbName = 'priceCallback_' + Date.now();
  const url = priceApi.url.trim() + '?names=' + encodeURIComponent(names.join('|')) + '&callback=' + cbName;

  try {
    await new Promise((resolve, reject) => {
      const timer = setTimeout(() => { delete window[cbName]; reject(new Error('시간 초과 (30초)')); }, 30000);
      window[cbName] = (data) => {
        clearTimeout(timer); delete window[cbName];
        if (!data.success) { reject(new Error('API 오류')); return; }
        let updated = 0, failed = 0;
        brokers.forEach(b => b.etfs.forEach(e => {
          const info = data.prices[e.name.trim()];
          if (info && info.price) { e.pr = String(info.price); updated++; }
          else failed++;
        }));
        saveBrokers();
        priceApi.status = 'success';
        priceApi.lastUpdated = data.updatedAt || new Date().toLocaleString('ko-KR');
        priceApi.message = `✅ ${updated}개 업데이트 완료${failed>0?' ('+failed+'개 실패)':''}`;
        renderAll(); resolve();
      };
      const s = document.createElement('script'); s.src = url;
      s.onerror = () => { clearTimeout(timer); delete window[cbName]; reject(new Error('스크립트 로드 실패')); };
      document.head.appendChild(s); setTimeout(() => s.remove(), 35000);
    });
  } catch(err) {
    priceApi.status = 'error'; priceApi.message = '❌ ' + err.message; renderPortfolio();
  }
}


// ── 계산 헬퍼 ──────────────────────────────────────
const val=(e)=>(parseFloat(e.sh)||0)*(parseFloat(e.pr)||0);
const bTot=(b)=>b.etfs.reduce((s,e)=>s+val(e),0);
const gTot=()=>brokers.reduce((s,b)=>s+bTot(b),0);
const pct=(a,t)=>t>0?a/t*100:0;
const fmtW=v=>{
  if(!v&&v!==0)return'-';
  if(v>=100000000)return(v/100000000).toFixed(2)+'억원';
  if(v>=10000)return Math.round(v/10000).toLocaleString()+'만원';
  return Math.round(v).toLocaleString()+'원';
};
const fmtP=v=>v.toFixed(1)+'%';
const getCat=name=>{
  const low=(name||'').toLowerCase();
  for(const c of CATS)if(c.kw.some(k=>low.includes(k)))return c;
  return CATS[3];
};
const catTotals=()=>{
  const m={};
  CATS.forEach(c=>{m[c.id]={...c,total:0,etfs:[]};});
  brokers.forEach(b=>b.etfs.forEach(e=>{
    const c=getCat(e.name),v=val(e);
    m[c.id].total+=v;
    const ex=m[c.id].etfs.find(x=>x.name===e.name);
    if(ex)ex.v+=v; else if(e.name.trim())m[c.id].etfs.push({name:e.name,v});
  }));
  return CATS.map(c=>m[c.id]);
};

// ── 수익률 계산 ──────────────────────────────────────
function calcStats(nasdaq_w, sp500_w, dow_w) {
  const w=[nasdaq_w/100, sp500_w/100, dow_w/100];
  const rets = HIST.map(r=>{
    return r[1]*w[0] + r[2]*w[1] + r[3]*w[2];
  });
  const avg = rets.reduce((s,r)=>s+r,0)/rets.length;
  const variance = rets.reduce((s,r)=>s+(r-avg)**2,0)/rets.length;
  const stddev = Math.sqrt(variance);
  const negYears = rets.filter(r=>r<0).length;
  const maxDrawdown = Math.min(...rets);
  const best = Math.max(...rets);
  // CAGR 근사: 30년 복리
  const cagr30 = Math.pow(HIST.slice(-30).reduce((prod,r,i)=>{
    const blended=r[1]*w[0]+r[2]*w[1]+r[3]*w[2];
    return prod*(1+blended/100);
  },1), 1/30)-1;
  return {avg, stddev, negYears, maxDrawdown, best, cagr:cagr30*100};
}

// 비교 테이블용 개별 지수 stats
function indexStats(colIdx) {
  const rets = HIST.map(r=>r[colIdx]);
  const avg = rets.reduce((s,r)=>s+r,0)/rets.length;
  const stddev = Math.sqrt(rets.reduce((s,r)=>s+(r-avg)**2,0)/rets.length);
  const negYears = rets.filter(r=>r<0).length;
  const maxDraw = Math.min(...rets);
  const best = Math.max(...rets);
  const cagr = (Math.pow(HIST.reduce((p,r)=>p*(1+r[colIdx]/100),1),1/HIST.length)-1)*100;
  return {avg,stddev,negYears,maxDraw,best,cagr};
}

  etfSec.appendChild(colHdr);
  const etfWrap=document.createElement('div');

  addArea.append(qLbl,qTags,addEBtn);

function makeEtfItem(b,e,gt,rebuild){
  const item=document.createElement('div');item.className='etf-item';
  const top=document.createElement('div');top.className='etf-item-top';
  const nameWrap=document.createElement('div');nameWrap.className='etf-name-wrap';
  const emSpan=document.createElement('span');emSpan.className='etf-emoji';emSpan.textContent=e.name?getCat(e.name).em:'';
  const nInp=document.createElement('input');nInp.className='etf-name-inp';nInp.placeholder='ETF명';nInp.value=e.name;
  nInp.oninput=()=>{e.name=nInp.value;emSpan.textContent=e.name?getCat(e.name).em:'';updateBot();};
  nInp.onblur=()=>{saveBrokers();updateHeader();};
  nameWrap.append(emSpan,nInp);

  const shInp=document.createElement('input');shInp.className='etf-num-inp';shInp.type='number';shInp.min='0';shInp.placeholder='주수';shInp.value=e.sh;
  shInp.oninput=()=>{e.sh=shInp.value;updateBot();};
  shInp.onblur=()=>{saveBrokers();updateHeader();};

  // 매수평균가 (노란 배경)
  const bpInp=document.createElement('input');bpInp.className='etf-num-inp buy';bpInp.type='number';bpInp.min='0';bpInp.placeholder='평균가';bpInp.value=e.bp||'';
  bpInp.title='매수 평균가';
  bpInp.oninput=()=>{e.bp=bpInp.value;updateBot();};
  bpInp.onblur=()=>{saveBrokers();};

  const prInp=document.createElement('input');prInp.className='etf-num-inp';prInp.type='number';prInp.min='0';prInp.placeholder='현재가';prInp.value=e.pr;
  prInp.oninput=()=>{e.pr=prInp.value;updateBot();};
  prInp.onblur=()=>{saveBrokers();updateHeader();};

  top.append(nameWrap,shInp,bpInp,prInp);

  const bot=document.createElement('div');bot.className='etf-item-bot';
  const valDiv=document.createElement('div');
  const pctDiv=document.createElement('span');
  const profitDiv=document.createElement('span');profitDiv.className='etf-profit zero';
  const delBtn=document.createElement('button');delBtn.className='etf-del';delBtn.textContent='✕';
  delBtn.onclick=()=>{b.etfs=b.etfs.filter(x=>x.id!==e.id);rebuild();renderAll();};

  function updateBot(){
    const gt2=gTot();
    const sh=parseFloat(e.sh)||0,pr=parseFloat(e.pr)||0,bp=parseFloat(e.bp)||0;
    const curVal=sh*pr,buyVal=sh*bp,p2=gt2>0?pct(curVal,gt2):0;
    if(curVal>0){valDiv.className='etf-val';valDiv.textContent=fmtW(curVal);pctDiv.className='etf-pct';pctDiv.textContent=' · '+fmtP(p2);}
    else{valDiv.className='etf-val empty';valDiv.textContent='-';pctDiv.textContent='';}
    if(buyVal>0&&curVal>0){
      const gp=((pr-bp)/bp)*100,ga=curVal-buyVal;
      profitDiv.className='etf-profit '+(gp>=0?'pos':'neg');
      profitDiv.textContent=(gp>=0?'+':'')+gp.toFixed(2)+'% ('+(ga>=0?'+':'')+fmtW(ga)+')';
    }else{profitDiv.className='etf-profit zero';profitDiv.textContent='';}
  }
  updateBot();

  const valWrap=document.createElement('div');valWrap.style.cssText='display:flex;align-items:center;gap:4px;flex-wrap:wrap';
  valWrap.append(valDiv,pctDiv,profitDiv);
  bot.append(valWrap,delBtn);item.append(top,bot);return item;
}

  tCard.append(tTitle,table,notice);pg.appendChild(tCard);
}

    if(!em2[k])em2[k]={name:k,total:0,rows:[]};

  [{lb:'총 평가금액',val:fmtW(gt),sub:(gt/100000000).toFixed(2)+'억원',c:'#6366f1'},
   {lb:'보유 종목',val:groups.filter(g=>g.total>0).length+'종목',sub:groups.length+'개 등록',c:'#0ea5e9'},
   {lb:'증권사·계좌',val:brokers.length+'개',sub:'',c:'#f59e0b'},
  ].forEach(s=>{

let simState = {
  age: 45,
  monthly: 100,   // 만원

  years: 60,      // 총 시뮬레이션 기간
  scenario: 'mid',
  ran: false,
  results: null,
};

// 시나리오별 연간 수익률 가정
const SCENARIOS = {
  opt: { label:'낙관', color:'#16a34a', bg:'#f0fdf4', bd:'#bbf7d0',
    nasdaq:14, sp500:11, dow:9,   desc:'AI·기술 호황 지속, 역사적 상위 25% 수준' },
  mid: { label:'중립', color:'#6366f1', bg:'#eff6ff', bd:'#bfdbfe',
    nasdaq:10, sp500: 8, dow:7,   desc:'역사적 평균 수준 (1995~2024 CAGR 기반)' },
  pes: { label:'비관', color:'#ef4444', bg:'#fef2f2', bd:'#fecaca',
    nasdaq: 5, sp500: 4, dow:3,   desc:'저성장·고금리 장기화, 역사적 하위 25% 수준' },
};

function blendReturn(sc, nasP, spP, dwP) {
  const s = SCENARIOS[sc];
  return (s.nasdaq*(nasP/100) + s.sp500*(spP/100) + s.dow*(dwP/100));
}

// 몬테카를로: 역사 연도 무작위 샘플링 + 적립 기간 반영
function monteCarloSimulate(initAmt, monthlyKRW, investYrs, totalYrs, nasP, spP, dwP, runs=500) {
  const pool = HIST.map(r => r[1]*(nasP/100) + r[2]*(spP/100) + r[3]*(dwP/100));
  const allPaths = [];
  for(let r=0;r<runs;r++){
    let amt = initAmt;
    for(let y=0;y<totalYrs;y++){
      const ret = pool[Math.floor(Math.random()*pool.length)];
      const contrib = y < investYrs ? monthlyKRW*12*10000 : 0;
      amt = amt*(1+ret/100) + contrib;
    }
    allPaths.push(amt);
  }
  allPaths.sort((a,b)=>a-b);
  return {
    p10: allPaths[Math.floor(runs*0.1)],
    p25: allPaths[Math.floor(runs*0.25)],
    p50: allPaths[Math.floor(runs*0.5)],
    p75: allPaths[Math.floor(runs*0.75)],
    p90: allPaths[Math.floor(runs*0.9)],
  };
}

// 복리 시뮬레이션 — 적립 기간 분리 반영
function simPath(initAmt, monthlyKRW, investYrs, totalYrs, annualRet) {
  const path = [initAmt];
  let amt = initAmt;
  for(let y=1;y<=totalYrs;y++){
    const contrib = y <= investYrs ? monthlyKRW*12*10000 : 0;
    amt = amt*(1+annualRet/100) + contrib;
    path.push(amt);
  }
  return path;
}

  msTitle.textContent='🏁 연도별 마일스톤 ('+S.label+' 시나리오)';
  const msList = document.createElement('div'); msList.className='milestones';

  const milestones = [];
  const checkpoints = [1,3,5,10,15,20,25,30,40,50,60].filter(y=>y<=yrs);
  checkpoints.forEach(y=>{
    const amt=path[y];
    const age2=simState.age+y;
    milestones.push({year:y,age:age2,amt});
  });

  milestones.forEach(m=>{
    const row=document.createElement('div');row.className='ms-row';
    const yr=document.createElement('div');yr.className='ms-year';yr.textContent='+'+m.year+'년';
    const dot=document.createElement('div');dot.className='ms-dot';dot.style.background=S.color;
    const info=document.createElement('div');info.className='ms-info';
    const amt=document.createElement('div');amt.className='ms-amt';amt.style.color=S.color;amt.textContent=fmtW(m.amt);
    const sub=document.createElement('div');sub.className='ms-sub';sub.textContent=m.age+'세 시점';
    info.append(amt,sub);
    const badge=document.createElement('div');badge.className='ms-badge';
    if(m.amt>=100000000){badge.style.cssText=`background:#fef9c3;color:#854d0e`;badge.textContent='💰 '+Math.floor(m.amt/100000000)+'억+';}
    else{badge.style.cssText='background:#f1f5f9;color:#64748b';badge.textContent=fmtW(m.amt);}
    row.append(yr,dot,info,badge);
    msList.appendChild(row);
  });

  msCard.append(msTitle,msList);
  pg.appendChild(msCard);

  // 면책 고지
  const notice=document.createElement('div');notice.className='notice';
  notice.textContent='⚠️ 본 시뮬레이션은 역사적 데이터(1995~2024)를 기반으로 한 참고용 예측입니다. 실제 투자 결과는 시장 상황, 환율, 세금, 수수료 등에 따라 크게 다를 수 있습니다. 투자 결정 전 반드시 전문가와 상담하세요.';
  pg.appendChild(notice);
}

// ── 차트 그리기 ──────────────────────────────────────
function drawChart(canvas, yrs, pathOpt, pathMid, pathPes, startAge, investYrs) {
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  const W=canvas.width, H=canvas.height;
  const pad={top:20,right:20,bottom:36,left:64};
  const cW=W-pad.left-pad.right, cH=H-pad.top-pad.bottom;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f8fafc'; ctx.fillRect(0,0,W,H);

  const allVals=[...pathOpt,...pathMid,...pathPes];
  const maxV=Math.max(...allVals), minV=0;
  const range=maxV-minV||1;

  const xPos=i=>(pad.left + (i/yrs)*cW);
  const yPos=v=>(pad.top + cH - ((v-minV)/range)*cH);

  // 격자선
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    const y=pad.top+cH*(i/4);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cW,y);ctx.stroke();
    const v=maxV*(1-i/4);
    ctx.fillStyle='#94a3b8';ctx.font='10px Noto Sans KR,sans-serif';ctx.textAlign='right';
    ctx.fillText(fmtW(v),pad.left-4,y+3);
  }

  // X축 라벨
  const xTicks=yrs<=20?[0,5,10,15,20].filter(x=>x<=yrs):[0,10,20,30,40,50,60].filter(x=>x<=yrs);
  ctx.fillStyle='#94a3b8';ctx.font='10px Noto Sans KR,sans-serif';ctx.textAlign='center';
  xTicks.forEach(y=>{
    const x=xPos(y);
    ctx.fillText((startAge+y)+'세',x,H-4);
    ctx.strokeStyle='#e2e8f0';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(x,pad.top);ctx.lineTo(x,pad.top+cH);ctx.stroke();
  });

  // 적립 중단 시점 수직선
  if(investYrs>0 && investYrs<yrs){
    const sx=xPos(investYrs);
    ctx.strokeStyle='#f59e0b'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(sx,pad.top);ctx.lineTo(sx,pad.top+cH);ctx.stroke();
    ctx.setLineDash([]);
    // 라벨
    ctx.fillStyle='#f59e0b'; ctx.font='bold 9px Noto Sans KR,sans-serif'; ctx.textAlign='center';
    ctx.fillText('적립종료 '+(startAge+investYrs)+'세', sx, pad.top+10);
  }

  // 면적 채우기 (낙관~비관 밴드)
  ctx.beginPath();
  for(let i=0;i<=yrs;i++) i===0?ctx.moveTo(xPos(i),yPos(pathOpt[i])):ctx.lineTo(xPos(i),yPos(pathOpt[i]));
  for(let i=yrs;i>=0;i--) ctx.lineTo(xPos(i),yPos(pathPes[i]));
  ctx.closePath();
  ctx.fillStyle='rgba(99,102,241,0.07)';ctx.fill();

  // 선 그리기 함수
  const drawLine=(path,color,dash=[])=>{
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash(dash);
    path.forEach((v,i)=>i===0?ctx.moveTo(xPos(i),yPos(v)):ctx.lineTo(xPos(i),yPos(v)));
    ctx.stroke();ctx.setLineDash([]);
  };

  drawLine(pathPes,'#ef4444',[4,3]);
  drawLine(pathOpt,'#16a34a',[4,3]);
  drawLine(pathMid,'#6366f1');

  // 범례
  const legends=[{c:'#16a34a',lb:'낙관'},{c:'#6366f1',lb:'중립'},{c:'#ef4444',lb:'비관'},{c:'#f59e0b',lb:'적립종료',dash:true}];
  let lx=pad.left;
  legends.forEach(lg=>{
    if(lg.dash){ctx.setLineDash([4,3]);}
    ctx.strokeStyle=lg.c;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(lx,12);ctx.lineTo(lx+16,12);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#475569';ctx.font='10px Noto Sans KR,sans-serif';ctx.textAlign='left';
    ctx.fillText(lg.lb,lx+20,15);
    lx+=52;
  });
}


function renderAll(){
  saveBrokers(); // 변경사항 자동 저장
  updateHeader();
  const activeTab=[...document.querySelectorAll('.tab')].findIndex(t=>t.classList.contains('on'));
  renderPortfolio();renderIndex();renderRec();renderSummary();
  if(activeTab===3) renderSim();
  const ids=['portfolio','index','rec','sim','summary'];
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.id==='p-'+ids[Math.max(0,activeTab)]));
}

renderAll();
