<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>💊 가족 약 체크</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- ════════════════════════════════════════════
       🔥 FIREBASE CONFIG
       Firebase 콘솔에서 복사한 값으로 교체하세요
       ════════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAR2CbcAmudW_S1WBS1n6xzucSaPeygKwA",
      authDomain:        "family-med-tracker-e61f1.firebaseapp.com",
      databaseURL:       "https://family-med-tracker-e61f1-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "family-med-tracker-e61f1",
      storageBucket:     "family-med-tracker-e61f1.firebasestorage.app",
      messagingSenderId: "322491100020",
      appId:             "1:322491100020:web:52d1e18b7a3c01c5cb1a21",
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── 전역 노출 (아래 UI 코드에서 사용) ──
    window._db    = db;
    window._ref   = ref;
    window._set   = set;
    window._onVal = onValue;
    window._firebaseReady = true;
    document.dispatchEvent(new Event("firebaseReady"));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parent-color: #4a90d9;
      --child-color:  #4caf7d;
      --bg:           #f7f3ee;
      --card:         #ffffff;
      --text:         #2a2a2a;
      --muted:        #aaa;
      --border:       #ede8e0;
      --radius:       18px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── header ── */
    header {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 16px 20px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 14px rgba(0,0,0,.06);
    }
    header .date-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; }
    header h1 { font-size: 20px; font-weight: 900; letter-spacing: -.5px; }

    /* ── layout ── */
    .wrap { max-width: 420px; margin: 0 auto; padding: 0 16px; }

    /* ── card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-top: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.07);
      border: 1.5px solid var(--border);
    }
    .card-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: .6px; text-transform: uppercase; margin-bottom: 14px;
    }

    /* ── today check ── */
    .member-row {
      padding: 14px;
      border-radius: 14px;
      border: 1.5px solid #f0f0f0;
      background: #fafafa;
      margin-bottom: 10px;
      transition: border-color .2s, background .2s;
    }
    .member-row.active-parent { background: #eef5fc; border-color: #a8ccee; }
    .member-row.active-child  { background: #fef3ec; border-color: #f5c19a; }

    .member-name {
      display: flex; align-items: center; gap: 7px;
      font-weight: 700; font-size: 14px; margin-bottom: 10px;
    }

    .dose-buttons { display: flex; gap: 8px; }
    .dose-btn {
      flex: 1; padding: 10px 0; border-radius: 12px;
      border: 2px solid #e0e0e0; background: white;
      color: #ccc; font-weight: 700; font-size: 13px;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 5px;
      transition: all .18s; font-family: inherit;
    }
    .dose-btn.done-parent {
      border-color: var(--parent-color);
      background: var(--parent-color);
      color: white;
      box-shadow: 0 4px 12px rgba(74,144,217,.4);
    }
    .dose-btn.done-child {
      border-color: var(--child-color);
      background: var(--child-color);
      color: white;
      box-shadow: 0 4px 12px rgba(76,175,125,.4);
    }

    /* ── member tabs ── */
    .tabs { display: flex; gap: 8px; margin-top: 14px; }
    .tab {
      flex: 1; padding: 10px 0; border-radius: 12px;
      border: 2px solid #e8e8e8; background: white;
      color: #999; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: all .18s; font-family: inherit;
    }
    .tab.active-parent { border-color: var(--parent-color); background: var(--parent-color); color: white; }
    .tab.active-child  { border-color: var(--child-color);  background: var(--child-color);  color: white; }

    /* ── calendar ── */
    .cal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .cal-nav {
      background: none; border: none; font-size: 22px; color: #ccc;
      cursor: pointer; padding: 4px 10px; line-height: 1;
    }
    .cal-title { font-weight: 800; font-size: 15px; }
    .cal-grid  { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-wd    { text-align: center; font-size: 11px; font-weight: 700; padding: 4px 0; color: #ccc; }
    .cal-wd:first-child { color: var(--child-color); }
    .cal-wd:last-child  { color: var(--parent-color); }
    .cal-day {
      aspect-ratio: 1; border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 2px solid transparent;
      transition: all .15s;
    }
    .cal-day span { font-size: 12px; line-height: 1; font-weight: 500; color: #555; }
    .cal-day:nth-child(7n+1) span { color: var(--child-color); }
    .cal-day:nth-child(7n)   span { color: var(--parent-color); }
    .cal-day.future { opacity: .2; }
    .cal-day.today  { border-color: var(--active-color, #4a90d9); background: var(--active-color, #4a90d9); }
    .cal-day.today span { color: white !important; font-weight: 800; }
    .cal-day.full   { background: color-mix(in srgb, var(--active-color, #4a90d9) 16%, white); }
    .cal-day.half   { background: color-mix(in srgb, var(--active-color, #4a90d9) 8%, white); }
    .dots { display: flex; gap: 2px; margin-top: 3px; }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #e4e4e4;
    }
    .dot.filled       { background: var(--active-color, #4a90d9); }
    .dot.filled-white { background: white; }

    /* ── legend ── */
    .legend {
      display: flex; gap: 12px; justify-content: center;
      margin-top: 14px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
    .legend-dot  { width: 12px; height: 12px; border-radius: 4px; }

    /* ── stats ── */
    .stats { display: flex; justify-content: space-around; }
    .stat  { text-align: center; }
    .stat-pct  { font-size: 26px; font-weight: 900; }
    .stat-label{ font-size: 11px; color: var(--muted); margin-top: 2px; }
    .stat-sub  { font-size: 11px; color: #ccc; }
    .stat-emoji{ font-size: 20px; margin-bottom: 2px; }

    /* ── sync indicator ── */
    #sync-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #ccc;
      margin-left: 6px; vertical-align: middle;
      transition: background .4s;
    }
    #sync-dot.syncing { background: #f0c040; }
    #sync-dot.synced  { background: #5cb85c; }
    #sync-dot.error   { background: #e05555; }

    /* ── loading ── */
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-size: 14px; color: var(--muted);
    }
  </style>
</head>
<body>

<div id="loading">잠깐만요... 💊</div>

<div id="app" style="display:none">
  <header>
    <div class="date-label" id="today-label"></div>
    <h1>💊 가족 약 체크 <span id="sync-dot"></span></h1>
  </header>

  <div class="wrap">

    <!-- ── Today Check ── -->
    <div class="card">
      <div class="card-title">오늘의 복약</div>

      <!-- 엄마 -->
      <div class="member-row" id="row-parent">
        <div class="member-name"><span>👩</span><span>나 (엄마)</span></div>
        <div class="dose-buttons">
          <button class="dose-btn" id="btn-parent-morning"
            onclick="toggle('parent','morning')">
            🌞 아침
          </button>
          <button class="dose-btn" id="btn-parent-evening"
            onclick="toggle('parent','evening')">
            🌙 저녁
          </button>
        </div>
      </div>

      <!-- 아들 -->
      <div class="member-row" id="row-child">
        <div class="member-name"><span>🐻</span><span>우리 아들</span></div>
        <div class="dose-buttons">
          <button class="dose-btn" id="btn-child-morning"
            onclick="toggle('child','morning')">
            🌞 아침
          </button>
          <button class="dose-btn" id="btn-child-evening"
            onclick="toggle('child','evening')">
            🌙 저녁
          </button>
        </div>
      </div>

    </div>

    <!-- ── Member Tabs ── -->
    <div class="tabs">
      <button class="tab" id="tab-parent" onclick="setMember('parent')">👩 나 (엄마)</button>
      <button class="tab" id="tab-child"  onclick="setMember('child')">🐻 우리 아들</button>
    </div>

    <!-- ── Calendar ── -->
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="shiftMonth(-1)">‹</button>
        <div class="cal-title" id="cal-title"></div>
        <button class="cal-nav" onclick="shiftMonth(+1)">›</button>
      </div>
      <div class="cal-grid" id="cal-wd"></div>
      <div class="cal-grid" id="cal-days" style="margin-top:4px"></div>
      <div class="legend" id="cal-legend"></div>
    </div>

    <!-- ── Stats ── -->
    <div class="card">
      <div class="stats" id="stats"></div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const MEMBERS = {
  parent: { label:"나 (엄마)", emoji:"👩", color:"#4a90d9", doses:["morning","evening"] },
  child:  { label:"우리 아들",  emoji:"🐻", color:"#4caf7d", doses:["morning","evening"] },
};
const DOSE_LABEL = { daily:"복약 완료", morning:"아침", evening:"저녁" };
const DOSE_EMOJI = { daily:"💊", morning:"🌞", evening:"🌙" };
const WD = ["일","월","화","수","목","금","토"];
const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

let records = {};         // { "parent-2025-04-12-daily": true, ... }
let activeMember = "parent";
let viewYear, viewMonth;

const today = new Date();
const todayStr = fmt(today);

function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtYMD(y,m,day) {
  return `${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}
function recKey(member, date, dose) { return `${member}-${date}-${dose}`; }
function isDone(member, date, dose) { return !!records[recKey(member,date,dose)]; }

// ═══════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════
let dbReady = false;
let pendingSave = null;

document.addEventListener("firebaseReady", () => {
  dbReady = true;
  const db = window._db;
  const dbRef = window._ref(db, "medication_tracker/records");

  // 실시간 리스너 — Firebase → 화면
  window._onVal(dbRef, (snapshot) => {
    records = snapshot.val() || {};
    setSyncState("synced");
    renderAll();
    if (document.getElementById("loading").style.display !== "none") {
      document.getElementById("loading").style.display = "none";
      document.getElementById("app").style.display = "block";
    }
  });

  if (pendingSave !== null) saveToFirebase(pendingSave);
});

function saveToFirebase(data) {
  if (!dbReady) { pendingSave = data; return; }
  setSyncState("syncing");
  window._set(window._ref(window._db, "medication_tracker/records"), data)
    .then(() => setSyncState("synced"))
    .catch(() => setSyncState("error"));
}

function setSyncState(state) {
  const dot = document.getElementById("sync-dot");
  dot.className = state;
}

// ═══════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════
function toggle(member, dose) {
  const key = recKey(member, todayStr, dose);
  records = { ...records, [key]: !records[key] };
  saveToFirebase(records);
  renderAll();
}

function setMember(m) {
  activeMember = m;
  renderAll();
}

function shiftMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderCalendar();
  renderStats();
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderAll() {
  renderHeader();
  renderTodayCheck();
  renderTabs();
  renderCalendar();
  renderStats();
}

function renderHeader() {
  document.getElementById("today-label").textContent =
    `${today.getFullYear()}년 ${MONTHS[today.getMonth()]} ${today.getDate()}일 ${WD[today.getDay()]}요일`;
}

function renderTodayCheck() {
  Object.keys(MEMBERS).forEach(mid => {
    const m = MEMBERS[mid];
    const row = document.getElementById(`row-${mid}`);
    if (row) row.className = "member-row" + (activeMember===mid ? ` active-${mid}` : "");

    m.doses.forEach(dose => {
      const btn = document.getElementById(`btn-${mid}-${dose}`);
      const done = isDone(mid, todayStr, dose);
      btn.className = "dose-btn" + (done ? ` done-${mid}` : "");
      btn.innerHTML = `${DOSE_EMOJI[dose]} ${DOSE_LABEL[dose]}${done ? " ✓" : ""}`;
    });
  });
}

function renderTabs() {
  Object.keys(MEMBERS).forEach(mid => {
    const tab = document.getElementById(`tab-${mid}`);
    tab.className = "tab" + (activeMember===mid ? ` active-${mid}` : "");
  });
}

function renderCalendar() {
  const m = MEMBERS[activeMember];
  const color = m.color;
  document.documentElement.style.setProperty("--active-color", color);

  document.getElementById("cal-title").textContent =
    `${viewYear}년 ${MONTHS[viewMonth]} ${m.emoji}`;

  // weekday headers
  const wdEl = document.getElementById("cal-wd");
  wdEl.innerHTML = WD.map((w,i) =>
    `<div class="cal-wd" style="${i===0?`color:var(--child-color)`:i===6?`color:var(--parent-color)`:""}">${w}</div>`
  ).join("");

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const totalCells = Math.ceil((firstDay+daysInMonth)/7)*7;

  const daysEl = document.getElementById("cal-days");
  daysEl.innerHTML = "";

  for (let i=0; i<totalCells; i++) {
    const dayNum = i - firstDay + 1;
    const valid = dayNum>=1 && dayNum<=daysInMonth;
    const cell = document.createElement("div");
    cell.className = "cal-day";

    if (valid) {
      const ds = fmtYMD(viewYear, viewMonth, dayNum);
      const isToday  = ds===todayStr;
      const isFuture = ds>todayStr;
      const allDone = m.doses.every(d => isDone(activeMember,ds,d));
      const anyDone = m.doses.some(d  => isDone(activeMember,ds,d));

      if (isFuture) cell.classList.add("future");
      else if (isToday) cell.classList.add("today");
      else if (allDone) cell.classList.add("full");
      else if (anyDone) cell.classList.add("half");

      const col = i%7;
      const numColor = isToday ? "white"
        : col===0 ? "var(--child-color)"
        : col===6 ? "var(--parent-color)"
        : "#555";

      let dotsHtml = "";
      if (!isFuture) {
        dotsHtml = `<div class="dots">${
          m.doses.map(d => {
            const filled = isDone(activeMember,ds,d);
            const cls = filled ? (isToday?"dot filled-white":"dot filled") : "dot";
            return `<div class="${cls}"></div>`;
          }).join("")
        }</div>`;
      }

      cell.innerHTML = `<span style="color:${numColor};font-weight:${isToday?800:500}">${dayNum}</span>${dotsHtml}`;
    }

    daysEl.appendChild(cell);
  }

  // legend
  document.getElementById("cal-legend").innerHTML = `
    <div class="legend-item">
      <div class="legend-dot" style="background:color-mix(in srgb,${color} 16%,white)"></div> 완료
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:color-mix(in srgb,${color} 8%,white)"></div> 일부만
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:${color};border:2px solid ${color}"></div> 오늘
    </div>
  `;
}

function renderStats() {
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const statsEl = document.getElementById("stats");
  statsEl.innerHTML = Object.entries(MEMBERS).map(([mid,m]) => {
    let total=0, done=0;
    for (let d=1; d<=daysInMonth; d++) {
      const ds = fmtYMD(viewYear, viewMonth, d);
      if (ds > todayStr) continue;
      m.doses.forEach(dose => {
        total++;
        if (isDone(mid,ds,dose)) done++;
      });
    }
    const pct = total>0 ? Math.round(done/total*100) : 0;
    return `
      <div class="stat">
        <div class="stat-emoji">${m.emoji}</div>
        <div class="stat-pct" style="color:${m.color}">${pct}%</div>
        <div class="stat-label">이번 달 복약률</div>
        <div class="stat-sub">${done}/${total}회</div>
      </div>`;
  }).join("");
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
viewYear  = today.getFullYear();
viewMonth = today.getMonth();

// Firebase 연결 전에도 헤더/달력 뼈대는 그려둠
renderHeader();
renderCalendar();
renderStats();

// Firebase 없이 테스트할 때를 위한 fallback (5초 후)
setTimeout(() => {
  if (document.getElementById("loading").style.display !== "none") {
    console.warn("Firebase 미연결 — localStorage fallback");
    try { records = JSON.parse(localStorage.getItem("med-records")||"{}"); } catch {}
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("sync-dot").className = "error";
    renderAll();

    // localStorage fallback용 save 덮어쓰기
    window.saveToFirebase = (data) => {
      try { localStorage.setItem("med-records", JSON.stringify(data)); } catch {}
    };
  }
}, 5000);
</script>
</body>
</html>
